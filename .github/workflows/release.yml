name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.output }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            output: colony-linux-x64
          - target: bun-linux-arm64
            output: colony-linux-arm64
          - target: bun-darwin-x64
            output: colony-darwin-x64
          - target: bun-darwin-arm64
            output: colony-darwin-arm64
          - target: bun-windows-x64
            output: colony-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            packages/cli/src/index.ts \
            --outfile ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum colony-linux-x64 colony-linux-arm64 colony-darwin-x64 colony-darwin-arm64 colony-windows-x64.exe > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            colony-linux-x64
            colony-linux-arm64
            colony-darwin-x64
            colony-darwin-arm64
            colony-windows-x64.exe
            checksums.txt
