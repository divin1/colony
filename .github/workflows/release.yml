name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-web:
    name: Build web UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web static files
        run: cd packages/web && bun run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: packages/web/out/
          if-no-files-found: error

  build:
    name: Build ${{ matrix.output }}
    runs-on: ubuntu-latest
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            output: colony-linux-x64
          - target: bun-linux-arm64
            output: colony-linux-arm64
          - target: bun-darwin-x64
            output: colony-darwin-x64
          - target: bun-darwin-arm64
            output: colony-darwin-arm64
          - target: bun-windows-x64
            output: colony-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            packages/cli/src/index.ts \
            --outfile ${{ matrix.output }}

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/

      - name: Package tarball
        run: |
          mkdir -p dist
          cp ${{ matrix.output }} dist/colony
          cp -r web dist/web
          tar -czf ${{ matrix.output }}.tar.gz -C dist colony web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum \
            colony-linux-x64.tar.gz \
            colony-linux-arm64.tar.gz \
            colony-darwin-x64.tar.gz \
            colony-darwin-arm64.tar.gz \
            colony-windows-x64.exe.tar.gz \
            > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            colony-linux-x64.tar.gz
            colony-linux-arm64.tar.gz
            colony-darwin-x64.tar.gz
            colony-darwin-arm64.tar.gz
            colony-windows-x64.exe.tar.gz
            checksums.txt
